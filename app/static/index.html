<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>Realtime Xiangqi Demo</title>
  <style>body { font-family: Arial, sans-serif; margin: 20px; } pre { background:#111;color:#0f0;padding:12px; }</style>
</head>
<body>
  <h1>Realtime Xiangqi Demo</h1>
  <button id="create">创建对局</button>
  <button id="snapshot">刷新状态</button>
  <p id="mid"></p>
  <pre id="out">等待操作...</pre>
  <script>
    let matchId = null;
    async function render() {
      if (!matchId) return;
      const res = await fetch(`/matches/${matchId}`);
      const data = await res.json();
      document.getElementById('out').textContent = JSON.stringify(data, null, 2);
    }
    document.getElementById('create').onclick = async () => {
      const res = await fetch('/matches', {method: 'POST'});
      const data = await res.json();
      matchId = data.match_id;
      document.getElementById('mid').textContent = `match_id: ${matchId}`;
      await render();
    };
    document.getElementById('snapshot').onclick = render;
  </script>
</body>
</html>
